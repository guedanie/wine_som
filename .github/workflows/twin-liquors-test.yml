name: Twin Liquors — test run (GitHub IP check)

# Isolated Twin Liquors scrape to answer one question: do GitHub's datacenter
# IPs get Cloudflare-1015-blocked (like Vivino), or does the paced scraper work?
# Manual only. Also reusable as an on-demand Twin Liquors runner.
on:
  workflow_dispatch:

jobs:
  twin:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt

      - name: Run Twin Liquors scraper + verdict
        run: |
          python3 - <<'PYEOF'
          import asyncio
          from scrapers.twin_liquors import TwinLiquorsScraper
          result = asyncio.run(TwinLiquorsScraper().run_full())
          n = result.get("wines_committed", 0)
          print(f"\n=== RESULT: {result}")
          if n > 0:
              print(f"=== VERDICT: PASS ✅ — GitHub IPs are NOT blocked ({n} wines committed). "
                    "Twin Liquors can live in weekly-scrape.yml.")
          else:
              print("=== VERDICT: BLOCKED ❌ — 0 wines committed (likely Cloudflare 1015 on the "
                    "datacenter IP). Move the Twin Liquors step to the residential-IP mini, like Vivino.")
              raise SystemExit(1)
          PYEOF
