name: Daily Vivino Enrichment

# Drains the Vivino backlog. Incremental: only wines with
# vivino_enriched_at IS NULL, so new wines from the weekly scrape are
# picked up automatically. Writes ratings/images to wines.vivino_* and
# facts (grapes/region/abv/structure/pairing) on high-confidence matches.
#
# Rate safety: Vivino intermittently throttles GitHub runner IPs, so the
# runner pauses 90s (up to 3x) on failure streaks before aborting, and
# never stamps on fetch failure. Four smaller runs/day beat two large
# ones: each run gets a fresh runner IP from the GH pool.

on:
  # Cron PAUSED 2026-07-05: GitHub runner datacenter IPs are blocklisted by
  # Vivino (~23 wines/day even on the crawl profile — it's an IP block, not
  # a rate limit). Enrichment will run locally from a residential IP instead.
  # Re-enable by uncommenting the schedule below.
  # schedule:
  #   - cron: '0 3 * * *'    # 03:00 UTC = 21:00 CT
  #   - cron: '0 9 * * *'    # 09:00 UTC = 03:00 CT
  #   - cron: '0 15 * * *'   # 15:00 UTC = 09:00 CT
  #   - cron: '0 21 * * *'   # 21:00 UTC = 15:00 CT
  workflow_dispatch:        # manual trigger only, for now

concurrency:
  group: vivino-enrichment
  cancel-in-progress: false  # never run two enrichments at once

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    defaults:
      run:
        working-directory: backend

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      GRAPEMINDS_API_KEY:        ${{ secrets.GRAPEMINDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Vivino enrichment (ratings, images, facts)
        run: python3 scripts/run_vivino_sample.py --limit 500 2>&1 | tee vivino-run.log

      # No-op until the SLACK_WEBHOOK_URL secret is configured.
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "no webhook configured, skipping" && exit 0
          python3 - <<'PYEOF'
          import json, os, re, urllib.request
          try:
              log = open("vivino-run.log").read()
          except FileNotFoundError:
              log = ""
          lines = [l.strip() for l in log.splitlines()
                   if re.search(r"Matched \+ written|Below threshold|No search hit|"
                                r"Fetch failures|Skipped \(abort\)|aborting run", l)]
          summary = "\n".join(lines) if lines else "(no run summary found)"
          status = os.environ["JOB_STATUS"]
          text = (f"Vivino enrichment — {status}\n"
                  f"{summary}\n"
                  f"<{os.environ['RUN_URL']}|View run>")
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps({"text": text}).encode(),
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req, timeout=15)
          PYEOF
