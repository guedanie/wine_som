name: Daily Vivino Enrichment

# Drains the Vivino backlog at 1,000 wines/run (~35 min at the rate-safe
# 2 req/s). Incremental: only wines with vivino_enriched_at IS NULL, so
# new wines from the weekly scrape are picked up automatically. Writes
# ratings/images to wines.vivino_* and facts (grapes/region/abv/structure/
# pairing) to wines + wine_details on high-confidence matches.
#
# Rate safety: the runner aborts after 10 consecutive fetch failures
# without stamping, so a 429-blocked run exits clean and retries next cron.
# Schedule avoids the Sunday 08:00-11:00 UTC weekly-scrape window.

on:
  schedule:
    - cron: '0 3 * * *'    # daily 03:00 UTC = 21:00 CT
    - cron: '0 15 * * *'   # daily 15:00 UTC = 09:00 CT
  workflow_dispatch:        # allow manual trigger from GitHub UI

concurrency:
  group: vivino-enrichment
  cancel-in-progress: false  # never run two enrichments at once

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      GRAPEMINDS_API_KEY:        ${{ secrets.GRAPEMINDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Vivino enrichment (ratings, images, facts)
        run: python3 scripts/run_vivino_sample.py --limit 1000
