name: Weekly Scrape + Extraction

on:
  schedule:
    - cron: '0 8 * * 0'   # Sunday 08:00 UTC = Sunday 02:00 CT
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3-hour ceiling

    defaults:
      run:
        working-directory: backend

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      GRAPEMINDS_API_KEY:        ${{ secrets.GRAPEMINDS_API_KEY }}
      KROGER_CLIENT_ID:          ${{ secrets.KROGER_CLIENT_ID }}
      KROGER_CLIENT_SECRET:      ${{ secrets.KROGER_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── scrapers ─────────────────────────────────────────────────────────
      - name: Scrape Geraldine's
        id: geraldines
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.geraldines import GeraldinesScraper
          asyncio.run(GeraldinesScraper().run_full())
          "

      - name: Scrape H-E-B (all active stores)
        id: heb
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.heb import HebScraper
          asyncio.run(HebScraper().run_full())
          "

      - name: Scrape Central Market (Austin stores 61 + 420)
        id: central_market
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.central_market import CentralMarketScraper
          asyncio.run(CentralMarketScraper().run_full())
          "

      - name: Scrape AOC Selections (San Antonio)
        id: aoc
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.aoc_selections import AOCSelectionsScraper
          asyncio.run(AOCSelectionsScraper().run_full())
          "

      - name: Scrape US Natural Wine (Austin)
        id: usnw
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.us_natural_wine import USNaturalWineScraper
          asyncio.run(USNaturalWineScraper().run_full())
          "

      - name: Scrape Antonelli's (Austin)
        id: antonellis
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.antonellis import AntonellisScraper
          asyncio.run(AntonellisScraper().run_full())
          "

      - name: Scrape Harvest Wine Market (Nashville)
        id: harvest
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.harvest_wine import HarvestWineScraper
          asyncio.run(HarvestWineScraper().run_full())
          "

      - name: Scrape Pogo's Wine & Spirits (Dallas)
        id: pogos
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.pogos import PogosScraper
          asyncio.run(PogosScraper().run_full())
          "

      - name: Scrape Kroger (Nashville — official API)
        id: kroger
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.kroger import KrogerScraper
          asyncio.run(KrogerScraper().run_full())
          "

      # Spec's runs on the RESIDENTIAL-IP mini (com.somm.specs, Sun 05:00 CT):
      # GitHub datacenter IPs are silently blocked by specsonline.com — every
      # weekly-scrape run 2026-07-01→07-13 completed "successfully" with 0
      # records; last real GH run 2026-06-19. Moved to the mini 2026-07-13.

      # Twin Liquors (City Hive) runs on the RESIDENTIAL-IP mini, not here:
      # GitHub datacenter IPs are Cloudflare-1015-blocked (confirmed 2026-07-10 —
      # workflow_dispatch test committed 0/12 stores), same as Vivino. See
      # docs/mac-mini-enrichment-server.md.

      # Extraction runs on the residential-IP Mac mini via the weekly
      # com.somm.extraction-enrich LaunchAgent (Sun 03:00 CT, one hour after
      # this workflow fires). Local qwen2.5:7b — Haiku-parity on facts, free.
      # Initial 5,516-wine backlog drained 2026-07-10 (5,974 written, 66%
      # structure coverage). See docs/reference/enrichment.md.

      # Vivino enrichment runs in its own workflow (daily-vivino.yml — PAUSED,
      # IP-blocked; moving local). Kept out of this job to avoid overlap.

      # Items that vanished from a retailer's feed keep claiming in_stock=True
      # forever (the scrape is upsert-only). For each successful run in the
      # window — the mini's included — flip rows the run didn't refresh to out
      # of stock. Safe by construction: failed/zero runs never sweep, and only
      # stores the run actually touched are swept.
      - name: Sweep delisted inventory
        if: always()
        continue-on-error: true
        run: python3 -m scripts.sweep_delisted --since-hours 24

      # A scraper can exit cleanly having written NOTHING (IP block, API
      # change) — step outcomes stay green. This reads the actual scraper_runs
      # rows (including the mini's Twin Liquors run when it's already fired),
      # flips silent-zero successes to failed, alerts Slack, and fails the
      # job. Spec's hid a 3.5-week outage behind success/0 before this existed.
      - name: Verify runs wrote records
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 -m scripts.verify_scrape_runs --since-hours 24

      # No-op until the SLACK_WEBHOOK_URL secret is configured.
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOMES: >-
            geraldines=${{ steps.geraldines.outcome }}
            heb=${{ steps.heb.outcome }}
            central_market=${{ steps.central_market.outcome }}
            aoc=${{ steps.aoc.outcome }}
            usnw=${{ steps.usnw.outcome }}
            antonellis=${{ steps.antonellis.outcome }}
            harvest=${{ steps.harvest.outcome }}
            pogos=${{ steps.pogos.outcome }}
            kroger=${{ steps.kroger.outcome }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "no webhook configured, skipping" && exit 0
          python3 - <<'PYEOF'
          import json, os, urllib.request
          outcomes = dict(p.split("=") for p in os.environ["OUTCOMES"].split())
          failed = [k for k, v in outcomes.items() if v != "success"]
          if failed:
              text = ("Weekly scrape — completed with failures: "
                      + ", ".join(failed))
          else:
              text = "Weekly scrape — all 9 scrapers succeeded"
          text += f"\n<{os.environ['RUN_URL']}|View run>"
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps({"text": text}).encode(),
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req, timeout=15)
          PYEOF
