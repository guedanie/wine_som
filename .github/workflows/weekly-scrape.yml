name: Weekly Scrape + Extraction

on:
  schedule:
    - cron: '0 8 * * 0'   # Sunday 08:00 UTC = Sunday 02:00 CT
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3-hour ceiling; Spec's alone takes ~30 min

    defaults:
      run:
        working-directory: backend

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      GRAPEMINDS_API_KEY:        ${{ secrets.GRAPEMINDS_API_KEY }}
      KROGER_CLIENT_ID:          ${{ secrets.KROGER_CLIENT_ID }}
      KROGER_CLIENT_SECRET:      ${{ secrets.KROGER_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── scrapers ─────────────────────────────────────────────────────────
      - name: Scrape Geraldine's
        id: geraldines
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.geraldines import GeraldinesScraper
          asyncio.run(GeraldinesScraper().run_full())
          "

      - name: Scrape H-E-B (all active stores)
        id: heb
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.heb import HebScraper
          asyncio.run(HebScraper().run_full())
          "

      - name: Scrape Central Market (Austin stores 61 + 420)
        id: central_market
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.central_market import CentralMarketScraper
          asyncio.run(CentralMarketScraper().run_full())
          "

      - name: Scrape AOC Selections (San Antonio)
        id: aoc
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.aoc_selections import AOCSelectionsScraper
          asyncio.run(AOCSelectionsScraper().run_full())
          "

      - name: Scrape US Natural Wine (Austin)
        id: usnw
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.us_natural_wine import USNaturalWineScraper
          asyncio.run(USNaturalWineScraper().run_full())
          "

      - name: Scrape Antonelli's (Austin)
        id: antonellis
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.antonellis import AntonellisScraper
          asyncio.run(AntonellisScraper().run_full())
          "

      - name: Scrape Harvest Wine Market (Nashville)
        id: harvest
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.harvest_wine import HarvestWineScraper
          asyncio.run(HarvestWineScraper().run_full())
          "

      - name: Scrape Kroger (Nashville — official API)
        id: kroger
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.kroger import KrogerScraper
          asyncio.run(KrogerScraper().run_full())
          "

      - name: Scrape Spec's (SA + Austin + Dallas)
        id: specs
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.specs import SpecsScraper, SA_STORE_NUMBERS, AUSTIN_STORE_NUMBERS, DALLAS_STORE_NUMBERS
          asyncio.run(SpecsScraper().run_full(SA_STORE_NUMBERS + AUSTIN_STORE_NUMBERS + DALLAS_STORE_NUMBERS))
          "

      # City Hive (Cloudflare-fronted). May trip a 1015 rate-limit on GitHub's
      # datacenter IPs — the scraper backs off + this step is continue-on-error,
      # so a block degrades gracefully. If GitHub IPs prove blocked (like Vivino),
      # move this to the residential-IP mini. See twinliquors_findings.md.
      - name: Scrape Twin Liquors (Austin + SA — City Hive)
        id: twin_liquors
        continue-on-error: true
        run: |
          python3 -c "
          import asyncio
          from scrapers.twin_liquors import TwinLiquorsScraper
          asyncio.run(TwinLiquorsScraper().run_full())
          "

      # ── extraction (Haiku, CAPPED) ────────────────────────────────────────
      # Capped at 1,500 wines/run to bound the Haiku spend now that the catalog
      # is large (SA+Austin+Nashville+NC+Dallas). A local LLM (Ollama) will take
      # over the bulk enrichment — see What's Next in CLAUDE.md. Backlog drains
      # ~1,500/week meanwhile; UPC dedup already makes national brands
      # recommendable without extraction.
      - name: Extract facts for new wines (--null-only, capped)
        id: extraction
        continue-on-error: true
        run: python3 -m enrichment.extraction.run_extraction --null-only --limit 1500

      # Vivino enrichment runs in its own workflow (daily-vivino.yml — PAUSED,
      # IP-blocked; moving local). Kept out of this job to avoid overlap.

      # No-op until the SLACK_WEBHOOK_URL secret is configured.
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOMES: >-
            geraldines=${{ steps.geraldines.outcome }}
            heb=${{ steps.heb.outcome }}
            central_market=${{ steps.central_market.outcome }}
            aoc=${{ steps.aoc.outcome }}
            usnw=${{ steps.usnw.outcome }}
            antonellis=${{ steps.antonellis.outcome }}
            harvest=${{ steps.harvest.outcome }}
            kroger=${{ steps.kroger.outcome }}
            specs=${{ steps.specs.outcome }}
            twin_liquors=${{ steps.twin_liquors.outcome }}
            extraction=${{ steps.extraction.outcome }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && echo "no webhook configured, skipping" && exit 0
          python3 - <<'PYEOF'
          import json, os, urllib.request
          outcomes = dict(p.split("=") for p in os.environ["OUTCOMES"].split())
          failed = [k for k, v in outcomes.items() if v != "success"]
          if failed:
              text = ("Weekly scrape — completed with failures: "
                      + ", ".join(failed))
          else:
              text = "Weekly scrape — all 10 scrapers + extraction succeeded"
          text += f"\n<{os.environ['RUN_URL']}|View run>"
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=json.dumps({"text": text}).encode(),
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req, timeout=15)
          PYEOF
